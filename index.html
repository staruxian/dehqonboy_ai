<!DOCTYPE html>
<html>
<head>
    <title>Keyboard Media</title>
    <style>
        body {
            margin: 0;
            background: white;
            overflow: hidden;
        }

        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            background: black;
        }
    </style>
</head>
<body>

<video id="videoPlayer" preload="auto" playsinline>
    <source src="1.mp4" type="video/mp4">
</video>

<audio id="audioPlayer" preload="auto">
    <source src="2.mp3" type="audio/mpeg">
</audio>

<script>
const video = document.getElementById("videoPlayer");
const audio = document.getElementById("audioPlayer");

async function playVideo() {
    // Stop audio
    audio.pause();
    audio.currentTime = 0;

    // Fully reset video
    video.pause();
    video.currentTime = 0;
    video.load();

    video.style.display = "block";

    try {
        await video.play();
        await video.requestFullscreen();
    } catch (err) {
        console.log("Video error:", err);
    }
}

async function playAudio() {
    // Stop video
    video.pause();
    video.currentTime = 0;

    if (document.fullscreenElement) {
        await document.exitFullscreen();
    }

    video.style.display = "none";

    // Reload video to prevent freeze bug
    video.load();

    // Play audio
    audio.currentTime = 0;
    try {
        await audio.play();
    } catch (err) {
        console.log("Audio error:", err);
    }
}

document.addEventListener("keydown", function(event) {
    if (event.key === "1") {
        playVideo();
    }

    if (event.key === "2") {
        playAudio();
    }
});
</script>

</body>
</html>
